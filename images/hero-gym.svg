<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo degradado -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c5aa0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3f73;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="floorGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a4a4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a2a2a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo -->
  <rect width="1200" height="600" fill="url(#bgGradient)"/>
  
  <!-- Piso del gimnasio -->
  <rect x="0" y="450" width="1200" height="150" fill="url(#floorGradient)"/>
  
  <!-- Equipos de gimnasio -->
  <!-- Máquina de pesas 1 -->
  <g transform="translate(100,300)">
    <rect x="0" y="0" width="80" height="120" fill="#333" rx="5"/>
    <rect x="10" y="10" width="60" height="20" fill="#ff6b35" rx="3"/>
    <circle cx="40" cy="140" r="15" fill="#444"/>
    <circle cx="40" cy="140" r="10" fill="#666"/>
  </g>
  
  <!-- Máquina de pesas 2 -->
  <g transform="translate(250,280)">
    <rect x="0" y="0" width="100" height="140" fill="#2a2a2a" rx="5"/>
    <rect x="15" y="15" width="70" height="25" fill="#2c5aa0" rx="3"/>
    <rect x="20" y="50" width="60" height="80" fill="#444" rx="3"/>
    <circle cx="50" cy="160" r="18" fill="#333"/>
    <circle cx="50" cy="160" r="12" fill="#555"/>
  </g>
  
  <!-- Banca de pesas -->
  <g transform="translate(400,350)">
    <rect x="0" y="0" width="120" height="15" fill="#8B4513" rx="7"/>
    <rect x="10" y="15" width="15" height="50" fill="#654321"/>
    <rect x="95" y="15" width="15" height="50" fill="#654321"/>
    <!-- Barra -->
    <rect x="-20" y="-10" width="160" height="8" fill="#C0C0C0" rx="4"/>
    <!-- Discos -->
    <circle cx="-15" cy="-6" r="12" fill="#333"/>
    <circle cx="135" cy="-6" r="12" fill="#333"/>
  </g>
  
  <!-- Mancuernas -->
  <g transform="translate(600,380)">
    <rect x="0" y="0" width="60" height="8" fill="#C0C0C0" rx="4"/>
    <circle cx="-5" cy="4" r="15" fill="#333"/>
    <circle cx="65" cy="4" r="15" fill="#333"/>
    
    <rect x="0" y="20" width="60" height="8" fill="#C0C0C0" rx="4"/>
    <circle cx="-5" cy="24" r="15" fill="#333"/>
    <circle cx="65" cy="24" r="15" fill="#333"/>
  </g>
  
  <!-- Cinta de correr -->
  <g transform="translate(800,320)">
    <rect x="0" y="0" width="150" height="80" fill="#2a2a2a" rx="5"/>
    <rect x="10" y="10" width="130" height="50" fill="#444" rx="3"/>
    <rect x="15" y="15" width="120" height="40" fill="#666"/>
    <!-- Panel de control -->
    <rect x="50" y="-20" width="50" height="30" fill="#333" rx="3"/>
    <circle cx="60" cy="-10" r="3" fill="#ff6b35"/>
    <circle cx="75" cy="-10" r="3" fill="#28a745"/>
    <circle cx="90" cy="-10" r="3" fill="#2c5aa0"/>
  </g>
  
  <!-- Personas ejercitándose -->
  <!-- Persona 1 - levantando pesas -->
  <g transform="translate(420,320)">
    <!-- Cuerpo -->
    <ellipse cx="0" cy="0" rx="8" ry="12" fill="#FFE4B5"/>
    <!-- Cabeza -->
    <circle cx="0" cy="-20" r="8" fill="#FFE4B5"/>
    <!-- Brazos -->
    <rect x="-15" y="-10" width="30" height="6" fill="#FFE4B5" rx="3"/>
    <!-- Piernas -->
    <rect x="-6" y="12" width="5" height="20" fill="#4169E1"/>
    <rect x="1" y="12" width="5" height="20" fill="#4169E1"/>
    <!-- Mancuerna -->
    <rect x="-25" y="-13" width="20" height="4" fill="#C0C0C0" rx="2"/>
    <circle cx="-27" cy="-11" r="6" fill="#333"/>
  </g>
  
  <!-- Persona 2 - en cinta -->
  <g transform="translate(875,300)">
    <!-- Cuerpo -->
    <ellipse cx="0" cy="0" rx="8" ry="12" fill="#DEB887"/>
    <!-- Cabeza -->
    <circle cx="0" cy="-20" r="8" fill="#DEB887"/>
    <!-- Brazos en movimiento -->
    <rect x="-12" y="-8" width="24" height="5" fill="#DEB887" rx="2" transform="rotate(10)"/>
    <!-- Piernas en movimiento -->
    <rect x="-6" y="12" width="5" height="18" fill="#FF1493" transform="rotate(-5)"/>
    <rect x="1" y="12" width="5" height="18" fill="#FF1493" transform="rotate(5)"/>
  </g>
  
  <!-- Espejos en las paredes -->
  <rect x="50" y="100" width="300" height="180" fill="#E6E6FA" opacity="0.3" rx="5"/>
  <rect x="850" y="120" width="250" height="160" fill="#E6E6FA" opacity="0.3" rx="5"/>
  
  <!-- Luces del techo -->
  <ellipse cx="200" cy="50" rx="30" ry="15" fill="#FFFFE0" opacity="0.8"/>
  <ellipse cx="500" cy="40" rx="30" ry="15" fill="#FFFFE0" opacity="0.8"/>
  <ellipse cx="800" cy="55" rx="30" ry="15" fill="#FFFFE0" opacity="0.8"/>
  <ellipse cx="1000" cy="45" rx="30" ry="15" fill="#FFFFE0" opacity="0.8"/>
  
  <!-- Texto motivacional -->
  <text x="600" y="150" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="36" font-weight="bold">
    FITZONE GYM
  </text>
  <text x="600" y="190" text-anchor="middle" fill="#ff6b35" font-family="Arial, sans-serif" font-size="18" font-weight="bold">
    TRANSFORMA TU CUERPO, TRANSFORMA TU VIDA
  </text>
</svg>